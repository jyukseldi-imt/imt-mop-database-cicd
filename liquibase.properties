# ============================================================
# Liquibase Properties File - AWS MySQL Database
# ============================================================

# -- Database Connection --
#-- url=${LIQUIBASE_URL}
#-- username=${LIQUIBASE_USERNAME}
#-- password=${LIQUIBASE_PASSWORD}

# -- JDBC Driver --
driver=com.mysql.cj.jdbc.Driver

# -- Master Changelog File (SQL format) --
changeLogFile=changelog/db.changelog-master.xml

# -- Default Schema --
defaultSchemaName=mop

# -- Liquibase Metadata Table (optional, defaults shown) --
databaseChangeLogTableName=DATABASECHANGELOG
databaseChangeLogLockTableName=DATABASECHANGELOGLOCK

# -- Logging --
logLevel=INFO
logFile=liquibase.log

# -- Output --
outputFileEncoding=UTF-8